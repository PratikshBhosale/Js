<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
<h1>...Age Group...</h1>
<script>
    var a=Number(prompt("Enter The Age"))
    if(a>0&&a<=12)
{
    document.write("Child")
}
  else  if(a>=13&&a<=19)
{
    document.write("Teenager")
}
  else  if(a>=20&&a<=59)
{
    document.write("Adult")
}
else if(a>=60)
{
   
    document.write("Senior Citizen") 
}
else
{
  document.write("Wrong Age We Enter")   
}
</script>
</body>
</html>
