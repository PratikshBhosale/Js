<!DOCTYPE html>
<html>
<head>
    <title>Student Pass Check</title>
</head>
<body>
    <h1>...Student Pass Check...</h1>

    <script>
        var sub1 = Number(prompt("Enter marks of Subject 1"));
        var sub2 = Number(prompt("Enter marks of Subject 2"));
        var sub3 = Number(prompt("Enter marks of Subject 3"));

        if (sub1 >= 35 && sub2 >= 35 && sub3 >= 35)
        {
            document.write("Student Passed in All Subjects");
        }
        else
        {
            document.write("Student Failed");
        }
    </script>
</body>
</html>
