<!DOCTYPE html>
<html>
<head>
    <title>Vowel Check</title>
</head>
<body>
    <h1>...Check Vowel Using Switch...</h1>

    <script>
        var ch = prompt("Enter a character");

        switch(ch)
        {
            case 'a':
            case 'e':
            case 'i':
            case 'o':
            case 'u':
            case 'A':
            case 'E':
            case 'I':
            case 'O':
            case 'U':
                document.write("Vowel");
                break;

            default:
                document.write("Not a Vowel");
        }
    </script>
</body>
</html>
