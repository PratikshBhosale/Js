<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>...Gread Based On Marks...</h1>
    <script>
        var m=Number(prompt("Enter The Marks"))
        if(m>=85)
    {
        document.write("Gread A")
    }
    else if(m>=75)
    {
        document.write("Gread B")
    }
       else if(m>=65)
    {
        document.write("Gread C")
    }
       else if(m>=55)
    {
        document.write("Gread D")
    }
    else
    {
          document.write("Fail") 
    }
    </script>
</body>
</html>
