    <script>
        var price=Number(prompt("Enter Your Price"));
        var d;
        var bill;

    {

        bill=price-d;
        console.log("Discount",d)
        console.log("Total",bill)
        document.write("Total Bill:",bill)
    }

          d=(price*10)/100;

         console.log("Discount",d)
           console.log("Total",bill)
        document.write("Total Bill:",bill)

           console.log("Total",bill)

    }
    </script>
