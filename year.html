<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>..Leap Year or Not...</h1>
    <script>
        var n=Number(prompt("Enter The Year"))
        if(n%4==0)
    {
        document.write("Leap Year")
    }
    else
    {
        document.write("Not Leap Year")
    }
    

    </script>
</body>
</html>
