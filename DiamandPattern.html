<!DOCTYPE html>
<html>
<head>
    <title>Diamond Pattern</title>
</head>
<body>
<pre id="output"></pre>

<script>
var ptr = "";
var n = 6;

// Upper Part
for (let i = 1; i <= n; i++) {
    
    // Spaces
    for (let j = 1; j <= n - i; j++) {
        ptr += " ";
    }

    // Stars
    for (let j = 1; j <= (2 * i - 1); j++) {
        ptr += "*";
    }

    ptr += "\n";
}

// Lower Part
for (let i = n - 1; i >= 1; i--) {
    
    // Spaces
    for (let j = 1; j <= n - i; j++) {
        ptr += " ";
    }

    // Stars
    for (let j = 1; j <= (2 * i - 1); j++) {
        ptr += "*";
    }

    ptr += "\n";
}

document.getElementById("output").innerText = ptr;
</script>

</body>
</html>
