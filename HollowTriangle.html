<!DOCTYPE html>
<html>
<head>
    <title>Hollow Triangle</title>
</head>
<body>
<pre id="output"></pre>

<script>
var ptr = "";
var n = 6;

for (let i = 1; i <= n; i++) {

    // Spaces
    for (let j = 1; j <= n - i; j++) {
        ptr += " ";
    }

    // Stars and spaces
    for (let j = 1; j <= (2 * i - 1); j++) {
        if (i == n || j == 1 || j == (2 * i - 1)) {
            ptr += "*";
        } else {
            ptr += " ";
        }
    }

    ptr += "\n";
}

document.getElementById("output").innerText = ptr;
</script>

</body>
</html>
