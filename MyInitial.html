<!DOCTYPE html>
<html>
<head>
    <title>Pattern P</title>
</head>
<body>
<pre id="output"></pre>

<script>
var ptr = "";
var n = 9;

for (let i = 1; i <= n; i++) {
    for (let j = 1; j <= n; j++) {

        if (
            j == 1 ||                 // Left vertical line
            (i == 1 && j < n) ||      // Top horizontal line
            (i == 5 && j < n) ||      // Middle horizontal line
            (j == n && i > 1 && i < 5) // Right vertical line (upper part)
        ) {
            ptr += "* ";
        } else {
            ptr += "  ";
        }
    }
    ptr += "\n";
}

document.getElementById("output").innerText = ptr;
</script>

</body>
</html>
