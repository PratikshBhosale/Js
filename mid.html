<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Middle Number</title>
</head>
<body>
    <h1>Middle Number</h1>

    <script>
        var a = Number(prompt("Enter First Number"));
        var b = Number(prompt("Enter Second Number"));
        var c = Number(prompt("Enter Third Number"));

        ((a > b && a < c) || (a < b && a > c))? console.log("A is Middle")
            : ((b > a && b < c) || (b < a && b > c))? console.log("B is Middle")
                : console.log("C is Middle");
    </script>
</body>
</html>
