<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Converter</title>
    <style>
        body{
            height: 100vh;
            width: auto;
            justify-content: center;
            align-items: center;
            display: flex;
            background-color:grey;
        }

        .card{
            height: 300px;
            width: 460px;
            background-color: pink;
            align-items: center;
            justify-content: center;
        }

        button{
            background-color: blue;
        }
    </style>
</head>
<body>
    <div class="card">

    <h1>Text Converter</h1>
    <textarea name="" id="content" rows="15" cols="60"></textarea>
    <br><br>
    <button onclick="convertUppercase()">Convert To Uppercase</button>
    <button onclick="convertLowercase()">Convert To Lowercase</button>
    <button onclick="countWord()">Count Words</button>

    </div>

    <script>
        let text=document.getElementById("content")
        function convertUppercase(){
            text.value=text.value.toUpperCase();
        }

         function convertLowercase(){
            text.value=text.value.toLowerCase();
        }

        function countWord(){
            text.value=text.value.trim().split(" ").length;
        }
    </script>
</body>
</html>
