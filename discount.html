<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>...Discount...</h1>
    <script>
        var bill=Number(prompt("Enter Your Bill"))
        if(bill>5000)
    {
        console.log("Discount Is 20%",(bill*20)/100)
    }
    else if(bill>3000)
    {
        console.log("Discount Is 10%",(bill*10)/100)
    }
    else if(bill>1000)
    {
        console.log("Discount Is 5%",(bill*5)/100)
    }
    else
    {
        console.log("No Discount")
    }
    </script>
</body>
</html>
