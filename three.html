<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Max Between Three Numbers</title>
</head>
<body>
    <h1>Max Between Three Numbers</h1>

    <script>
        var a = Number(prompt("Enter First Number"));
        var b = Number(prompt("Enter Second Number"));
        var c = Number(prompt("Enter Third Number"));

        (a >= b && a >= c)? console.log("A is Large")
            : (b >= a && b >= c)? console.log("B is Large")
                : console.log("C is Large");
    </script>
</body>
</html>
