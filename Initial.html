<!DOCTYPE html>
<html>
<head>
    <title>Pattern E</title>
</head>
<body>
<pre id="output"></pre>

<script>
var ptr = "";
var n = 9;

for (let i = 1; i <= n; i++) {
    for (let j = 1; j <= n; j++) {

        if (
            i == 1 ||      
            i == 5 ||      
            i == 9 ||      
            (j == 1 && i < 5) ||   
               (j == 9 && i > 5)      
        ) {
            ptr += "*";
        } else {
            ptr += " ";
        }
    }
    ptr += "\n";
}

document.getElementById("output").innerText = ptr;
</script>

</body>
</html>
