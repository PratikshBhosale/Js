<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do App</title>
    <style>
 body
{
    background-color:pink;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.card
{
    width: 400px;
    border: 2px solid black;
    padding: 20px;
    background: lightblue;
    border-radius: 10px;
}
.dle
{
    background-color: red;
}
.up
{
    background-color: green;
}
.add
{
    background-color: blue;
}
    </style>
</head>
<body>

    <div class="card">
    <h1>📝 To Do App</h1>

    <input type="text" id="todo" placeholder="Enter A Task">
    <button class="add" onclick="addTodo()">Add ToDo</button>

    <ul id="todolist"></ul>
</div>

    <script>
      
        let arr = [];

        let task = document.getElementById("todo");
        let list = document.getElementById("todolist");

        function addTodo() {
            if (task.value === "") {
                alert("Please enter a task");
                return;
            }

            arr.push(task.value);
            task.value = "";
            renderTodo();
        }

        function renderTodo() {
            list.innerHTML = "";

            arr.forEach((val, index) => {
                list.innerHTML += `
                    <li>
                        ${val}
                        <button class="dle" onclick="deleteTodo(${index})">Delete</button>8
                        <button class="up" onclick="updateTodo(${index})">Update</button>
                    </li>
                `;
            });
        }

        function deleteTodo(index) {
            arr.splice(index, 1);
            renderTodo();
        }

        function updateTodo(index) {
            let newTask = prompt("Enter new task", arr[index]);

            if (newTask !== null && newTask !== "") {
                arr[index] = newTask;
                renderTodo();
            }
        }
      
    </script>

</body>
</html>
