<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>....calculator.....</h1>
    <script>
        var num1=Number(prompt("Enter one number"));
        var num2=Number(prompt("Enter second number"));
        var ch=Number(prompt(".......Operation.........\n1.addition\n2.substraction\n3.multiplication\n4.division"));
        switch(ch)
        {
            case 1:document.write("<h1>Addition is:",+(num1+num2));break;
            case 2:document.write("<h1>Subtraction is:",+(num1-num2));break;
            case 3:document.write("<h1>Multiplication is:",+(num1*num2));break;
            case 4:document.write("<h1>Division is:",+(num1/num2));break;
                default:document.write("Wrong Choice")
        }


    </script>
    
</body>
</html>
