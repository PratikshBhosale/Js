<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orignal Signal</title>
    <style>
         .box{
            height: 100px;
            width: 100px;
            border: 1px solid;
            border-radius: 50%;
            margin-left: 700px;
        }
    </style>
</head>
<body>
    <div id="box1" class="box">
        <span id="count">3</span>
    </div>
   
      <div id="box2" class="box">   <span id="count">3</span> </div>
     
      <div id="box3" class="box">    <span id="count">3</span> </div>
    
    <script>
          let box1=document.getElementById("box1");
          let box2=document.getElementById("box2");
          let box3=document.getElementById("box3");

          box1.innerHTML = "3";
          box2.innerHTML = "3";
          box3.innerHTML = "3";

setTimeout(() => {
    box1.innerHTML = "2";
}, 1000);

setTimeout(() => {
    box1.innerHTML = "1";
}, 2000);

setTimeout(() => {
    box1.innerHTML = "";
}, 3000);






    function startSignal()
        {

        box1.style.background = "red";
        box2.style.background = "white";
        box3.style.background = "white";

        setTimeout(() => 
        {
            box1.style.background = "white";
            box2.style.background = "orange";
            box3.style.background = "white";

                        setTimeout(() => {
                box2.innerHTML = "2";
            }, 1000);

            setTimeout(() => {
                box2.innerHTML = "1";
            }, 2000);

            setTimeout(() => {
                box2.innerHTML = "";
            }, 3000);
        }, 3000); 

        setTimeout(() => 
        {
            box1.style.background = "white";
            box2.style.background = "white";
            box3.style.background = "green";

                        box3.innerHTML = "3";

            setTimeout(() => {
                box3.innerHTML = "2";
            }, 1000);

            setTimeout(() => {
                box3.innerHTML = "1";
            }, 2000);

            setTimeout(() => {
                box3.innerHTML = "Go";
            }, 3000);
        }, 6000); 
    }

startSignal();
</script>
</body>
</html>
