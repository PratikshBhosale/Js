<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>...Positive or Even Check Number...</h1>
    <script>
        var n=Number(prompt("Enter The Number"))
        if(n>0)
    {
        document.write("Positive Number<br>")
        if(n%2==0)
    {
     document.write("Even Number")   
    }
    else
    {
        document.write("Odd Number")
    }
    }
    else
    {
       document.write(" Not Positive Number")   
    }
    </script>
    
</body>
</html>
