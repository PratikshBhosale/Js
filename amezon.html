       function display(list){
    container.innerHTML="";

    list.forEach((product)=>{

        let div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <img src="${product.img}" alt="">
            <h3>Product Name: ${product.pname}</h3>
            <p>Company: ${product.cname}</p>
            <p>Price: ₹${product.price}</p>
            <p>${product.star}</p>
            <button>Buy Now</button>
        `;

        container.appendChild(div);
    });
}

display(products);

companyFilter.addEventListener("change", function(){

    let company = companyFilter.value;

    let filteredProducts;

    if(company == ""){
        filteredProducts = products;
    }
    else{

        filteredProducts = products.filter(function(item){

            return item.cname === company;

        });

    }

    display(filteredProducts);

});

display(products);



search.addEventListener("input",()=>{
    let searchval=search.value.toLowerCase();

    let filtered=products.filter((pr)=>{
        return pr.pname.toLowerCase().includes(searchval)
    })
    display(filtered)

   sortPrice.addEventListener("change", function(){

    if(this.value == "low"){
        products.sort((a,b) => a.price - b.price);
    }

    else if(this.value == "high"){
        products.sort((a,b) => b.price - a.price);
    }

    display(products);

});
})
