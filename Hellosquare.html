<!DOCTYPE html>
<html>
<head>
    <title>Hollow Square Pattern</title>
</head>
<body>
<pre id="output"></pre>

<script>
var ptr = "";

for (let i = 1; i <= 6; i++) {
    for (let j = 1; j <= 6; j++) {
        if (i == 1 || i == 6 || j == 1 || j == 6) {
            ptr += "*";
        } else {
            ptr += " ";
        }
    }
    ptr += "\n";
}

document.getElementById("output").innerText = ptr;
</script>

</body>
</html>
